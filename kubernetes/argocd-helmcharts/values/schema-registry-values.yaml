# Confluent Schema Registry Helm Chart Values
# https://github.com/confluentinc/cp-helm-charts
# Chart: cp-schema-registry

# Image configuration
image: confluentinc/cp-schema-registry
imageTag: "7.7.1"

# Replica count
replicas: 1

# Service configuration
service:
  type: ClusterIP
  port: 8081

# Kafka Store configuration (how Schema Registry connects to Kafka)
kafkaStore:
  bootstrapServers: "primary-kafka-bootstrap:9092"

# Schema Registry configuration overrides
configurationOverrides:
  listeners: "http://0.0.0.0:8081"
  host.name: "schema-registry-0.schema-registry-headless.kafka.svc.cluster.local"
  kafkastore.bootstrap.servers: "primary-kafka-bootstrap:9092"

# Persistence configuration
persistence:
  enabled: true
  size: 10Gi
  storageClass: "kafka-cluster-sc"
  accessMode: ReadWriteOnce

# Resource limits
resources:
  requests:
    cpu: "100m"
    memory: "250Mi"
  limits:
    cpu: "250m"
    memory: "1Gi"

