---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mysql-source-innovate-secret
  namespace: kafka
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 15m #1h  # Periodic sync interval
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: mysql-source-innovate-secret  # Kubernetes secret name
    namespace: kafka
    creationPolicy: Owner
  data:
  - secretKey: username
    remoteRef:
      key: source-innov8-mysql
      property: user
  - secretKey: password
    remoteRef:
      key: source-innov8-mysql
      property: password
  - secretKey: host
    remoteRef:
      key: source-innov8-mysql
      property: host
  - secretKey: database
    remoteRef:
      key: source-innov8-mysql
      property: database
---
