  resources: ["secrets"]
  resourceNames: ["mysql-sink-innovate-secret","mysql-source-innovate-secret","mysql-sink-ni-secret","mysql-source-ni-secret","mysql-sink-loyalty-secret","mysql-source-loyalty-secret"]
