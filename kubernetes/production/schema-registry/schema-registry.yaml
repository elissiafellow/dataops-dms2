apiVersion: v1
kind: Service
metadata:
  name: schema-registry
  namespace: kafka
  labels:
    app: schema-registry
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
      name: http
  selector:
    app: schema-registry
---
apiVersion: v1
kind: Service
metadata:
  name: schema-registry-headless
  namespace: kafka
  labels:
    app: schema-registry
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
      name: http
  selector:
    app: schema-registry
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: schema-registry
  namespace: kafka
  labels:
    app: schema-registry
spec:
  serviceName: schema-registry-headless
  replicas: 1
  selector:
    matchLabels:
      app: schema-registry
  template:
    metadata:
      labels:
        app: schema-registry
    spec:
      containers:
      - name: schema-registry
        image: confluentinc/cp-schema-registry:8.0.4
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
          name: http
        env:
        - name: SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS
          value: "primary-kafka-bootstrap:9092"
        - name: SCHEMA_REGISTRY_HOST_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: SCHEMA_REGISTRY_LISTENERS
          value: "http://0.0.0.0:8081"
        - name: SCHEMA_REGISTRY_SCHEMA_REGISTRY_INTER_INSTANCE_PROTOCOL
          value: "http"
        livenessProbe:
          httpGet:
            path: /subjects
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /subjects
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        resources:
          requests:
            cpu: "100m"
            memory: "250Mi"
          limits:
            cpu: "250m"
            memory: "1Gi"
        volumeMounts:
        - name: schema-registry-data
          mountPath: /var/lib/schema-registry
  volumeClaimTemplates:
  - metadata:
      name: schema-registry-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: kafka-cluster-sc
      resources:
        requests:
          storage: 10Gi
