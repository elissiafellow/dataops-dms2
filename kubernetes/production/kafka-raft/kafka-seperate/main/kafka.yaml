apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: controller
  labels:
    strimzi.io/cluster: primary
  namespace: kafka
spec:
  replicas: 1  # Reduced from 3 for learning setup
  roles:
    - controller
  storage:
    type: jbod
    volumes:
      - id: 0 # controllers should always have a single volume, the metadata log is stored on one volume only. Using JBOD storage with multiple volumes does not benefit performance or disk space for these nodes since they only require storage for the metadata log.
        type: persistent-claim
        size: 30Gi
        kraftMetadata: shared
        deleteClaim: false
        class: kafka-cluster-sc
  resources:
      requests:
        memory: "1000Mi"
        cpu: "300m"
      limits:
        memory: "1500Mi"
        cpu: "500m"
  template:
    pod:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kafka-cluster-role
                    operator: In
                    values:
                      - "kafka-cluster"
    persistentVolumeClaim:
      metadata:
        annotations:
          argocd.argoproj.io/tracking-id: "kafka-cluster:argoproj.io/Application:argocd/kafka-cluster"
          argocd.argoproj.io/compare-options: IgnoreExtraneous
          argocd.argoproj.io/sync-options: Prune=false
  jvmOptions:
    gcLoggingEnabled: true
    "-Xms":  "250m" 
    "-Xmx":  "1g"
    "-XX":
      "UseG1GC": "true"
      "MaxGCPauseMillis": "40"
      "InitiatingHeapOccupancyPercent": "45"
      "ExplicitGCInvokesConcurrent": "true"
    javaSystemProperties:
      - name: javax.net.debug
        value: ssl
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: broker
  labels:
    strimzi.io/cluster: primary
  namespace: kafka
spec:
  replicas: 1  # Reduced from 3 for learning setup
  roles:
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 75Gi
        kraftMetadata: shared
        deleteClaim: false
        class: kafka-cluster-sc
      - id: 1
        type: persistent-claim
        size: 75Gi
        deleteClaim: false
        class: kafka-cluster-sc
      - id: 2
        type: persistent-claim
        size: 75Gi
        deleteClaim: false
        class: kafka-cluster-sc
      - id: 3
        type: persistent-claim
        size: 75Gi
        deleteClaim: false
        class: kafka-cluster-sc
  template:
    pod:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kafka-cluster-role
                    operator: In
                    values:
                      - "kafka-cluster"
    persistentVolumeClaim:
      metadata:
        annotations:
          argocd.argoproj.io/tracking-id: "kafka-cluster:argoproj.io/Application:argocd/kafka-cluster"
          argocd.argoproj.io/compare-options: IgnoreExtraneous
          argocd.argoproj.io/sync-options: Prune=false
  
  ## resources during snapshot phase
  resources:
      requests:
        memory: "3000Mi"
        cpu: "500m"
      limits:
        memory: "10000Mi"
        cpu: "2500m"
  jvmOptions:
    gcLoggingEnabled: true
    "-Xms":  "2g" 
    "-Xmx":  "8g"
    "-XX":
      "UseG1GC": "true"
      "MaxGCPauseMillis": "40"
      "InitiatingHeapOccupancyPercent": "45"
      "ExplicitGCInvokesConcurrent": "true"
    javaSystemProperties:
      - name: javax.net.debug
        value: ssl
        
