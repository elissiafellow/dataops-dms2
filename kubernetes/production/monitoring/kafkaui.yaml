# https://docs.kafka-ui.provectus.io/configuration/misc-configuration-properties
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
    spec:
      containers:
        - name: kafka-ui
          image: provectuslabs/kafka-ui:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "256Mi"
          env:
            - name: DYNAMIC_CONFIG_ENABLED
              value: "true"
            - name: AUTH_TYPE
              value: "LOGIN_FORM"
            - name: SPRING_SECURITY_USER_NAME
              value: "admin"
            - name: SPRING_SECURITY_USER_PASSWORD
              value: "pass"
            - name: KAFKA_CLUSTERS_0_NAME
              value: "primary"
            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              value: "primary-kafka-bootstrap.kafka.svc.cluster.local:9092"
            - name: KAFKA_CLUSTERS_0_METRICS_PORT
              value: "9999"
            - name: KAFKA_CLUSTERS_0_METRICS_TYPE
              value: "jmx" # prometheus on port 9404
            - name:  KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME
              value: "kafka-connect-cluster"
            - name: KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS
              value: http://kafka-connect-cluster-connect-api.kafka.svc.cluster.local:8083


            - name: KAFKA_CLUSTERS_0_SCHEMAREGISTRY
              value: http://schema-registry.kafka.svc.cluster.local:8081

              
            # - name: KAFKA_CLUSTERS_1_NAME
            #   value: "secondary-cluster"
            # - name: KAFKA_CLUSTERS_1_BOOTSTRAPSERVERS
            #   value: "secondary-kafka-bootstrap:9092"
            # - name: KAFKA_CLUSTERS_1_ZOOKEEPER
            #   value: "secondary-zookeeper-client:2181"
            # - name: KAFKA_CLUSTERS_1_METRICS_PORT
            #   value: "9999"

            # - name: KAFKA_CLUSTERS_1_NAME
            #   value: "secondary-cluster"
            # - name: KAFKA_CLUSTERS_1_BOOTSTRAPSERVERS
            #   value: "secondary-kafka-bootstrap:9090,secondary-kafka-bootstrap:9091,secondary-kafka-bootstrap:9092"
            # - name: KAFKA_CLUSTERS_1_ZOOKEEPER
            #   value: "secondary-zookeeper-client:2181"

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kafka-cluster-role
                    operator: In
                    values:
                      - "admin-tools"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
  namespace: monitoring
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: kafka-ui
